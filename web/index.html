<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="An Appointment Management System.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GetInLine">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Optional: Google Sign-In client ID (from .env) -->
  <script>
    // Load client ID from .env (requires build step or JS injection)
    fetch('/.env')
      .then(response => response.text())
      .then(text => {
        const match = text.match(/GOOGLE_SIGNIN_CLIENT_ID=(.*)/);
        if (match) {
          const clientId = match[1].trim();
          const meta = document.createElement('meta');
          meta.name = 'google-signin-client_id';
          meta.content = clientId;
          document.head.appendChild(meta);
        }
      });
  </script>

  <title>GetInLine</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Identity Services (required for Google Sign-In on web) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Firebase SDK (must come before flutter_bootstrap.js) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging-compat.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Register Firebase Messaging Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then(function (registration) {
            console.log('ServiceWorker registration successful with scope:', registration.scope);
          })
          .catch(function (error) {
            console.log('ServiceWorker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
